<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Discord</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0800;
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: 0.35;
    z-index: 0;
  }

  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .dragon {
    position: fixed;
    font-size: 160px;
    opacity: 0.12;
    z-index: 1;
    user-select: none;
    filter: sepia(1) saturate(3) hue-rotate(10deg);
  }
  .dragon-left  { left: -30px; top: 50%; transform: translateY(-60%); animation: dragonFloatL 6s ease-in-out infinite; }
  .dragon-right { right: -30px; bottom: 10%; animation: dragonFloatR 6s ease-in-out infinite; animation-delay: -3s; }
  @keyframes dragonFloatL {
    0%, 100% { transform: translateY(-60%) rotate(-3deg); }
    50%       { transform: translateY(-50%) rotate(3deg); }
  }
  @keyframes dragonFloatR {
    0%, 100% { transform: scaleX(-1) rotate(3deg); }
    50%       { transform: scaleX(-1) translateY(-20px) rotate(-3deg); }
  }

  .container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 28px;
    padding: 40px 24px;
    animation: fadeUp 1s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .heading { max-width: 600px; line-height: 1.2; }
  .heading h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 40px rgba(0,0,0,0.8);
  }
  .heading h1 em { color: #e8920a; font-style: normal; }

  .subtext {
    color: rgba(255,255,255,0.45);
    font-size: 0.95rem;
    max-width: 420px;
    line-height: 1.7;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: linear-gradient(135deg, #e8920a, #c97a08);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 18px 40px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255,200,80,0.3);
    box-shadow: 0 0 30px rgba(232,146,10,0.4), 0 0 80px rgba(232,146,10,0.15);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 1s 0.3s ease both;
  }
  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s;
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 0 50px rgba(232,146,10,0.6), 0 0 100px rgba(232,146,10,0.2); }
  .btn:hover::before { left: 150%; }
  .btn svg { width: 28px; height: 28px; fill: #fff; flex-shrink: 0; }

  .small-link {
    color: rgba(255,255,255,0.3);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-decoration: none;
    transition: color 0.2s;
    animation: fadeUp 1s 0.5s ease both;
  }
  .small-link:hover { color: #e8920a; }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.25);
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: fadeUp 1s 0.6s ease both;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #3ba55c;
    box-shadow: 0 0 8px #3ba55c;
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div class="vignette"></div>
<div class="dragon dragon-left">🐉</div>
<div class="dragon dragon-right">🐉</div>

<div class="container">
  <div class="heading">
    <h1>Dołącz do <em>naszej społeczności.</em></h1>
  </div>

  <p class="subtext">
    Kliknij poniżej, aby dołączyć do serwera Discord i być częścią czegoś większego.
  </p>

  <a class="btn" href="https://discord.gg/N5Vs4PT2dB" target="_blank">
    <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
      <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
    </svg>
    [ Dołącz teraz ]
  </a>

  <a class="small-link" href="https://discord.gg/N5Vs4PT2dB" target="_blank">discord.gg/N5Vs4PT2dB →</a>

  <div class="status">
    <div class="dot"></div>
    Serwer online
  </div>
</div>

<script>
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const cols = Math.floor(canvas.width / 20);
  const drops = Array(cols).fill(1);

  function draw() {
    ctx.fillStyle = 'rgba(10, 8, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#b87008';
    ctx.font = '14px monospace';
    for (let i = 0; i < drops.length; i++) {
      const txt = Math.random() > 0.5 ? '1' : '0';
      ctx.fillText(txt, i * 20, drops[i] * 20);
      if (drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 40);

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>
</body>
</html>
