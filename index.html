<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Discord</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0812;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: 0.28;
    z-index: 0;
  }

  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 25%, rgba(13,8,18,0.92) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb-1 {
    width: 500px; height: 500px;
    left: -150px; top: -100px;
    background: radial-gradient(circle, rgba(180,80,180,0.18) 0%, transparent 70%);
  }
  .glow-orb-2 {
    width: 400px; height: 400px;
    right: -120px; bottom: -80px;
    background: radial-gradient(circle, rgba(220,80,150,0.15) 0%, transparent 70%);
  }
  .glow-orb-3 {
    width: 300px; height: 300px;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(140,60,200,0.1) 0%, transparent 70%);
  }

  .heart-deco {
    position: fixed;
    font-size: 110px;
    opacity: 0.10;
    z-index: 1;
    user-select: none;
    filter: hue-rotate(0deg) saturate(2);
  }
  .heart-left  {
    left: -20px; top: 50%;
    transform: translateY(-60%);
    animation: heartFloatL 7s ease-in-out infinite;
  }
  .heart-right {
    right: -20px; bottom: 12%;
    animation: heartFloatR 7s ease-in-out infinite;
    animation-delay: -3.5s;
  }
  @keyframes heartFloatL {
    0%, 100% { transform: translateY(-60%) rotate(-6deg); }
    50%       { transform: translateY(-52%) rotate(4deg); }
  }
  @keyframes heartFloatR {
    0%, 100% { transform: rotate(5deg); }
    50%       { transform: translateY(-18px) rotate(-4deg); }
  }

  .container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 26px;
    padding: 48px 28px;
    animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(36px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(200, 80, 160, 0.14);
    border: 1px solid rgba(220, 100, 180, 0.28);
    color: #e8a0cc;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    animation: fadeUp 0.9s 0.1s ease both;
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #d966aa;
    box-shadow: 0 0 6px #d966aa;
    animation: blink 2.2s infinite;
  }

  .heading {
    max-width: 560px;
    line-height: 1.18;
    animation: fadeUp 0.9s 0.15s ease both;
  }
  .heading h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.9rem, 5.5vw, 3.2rem);
    font-weight: 700;
    color: #f5eef8;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 40px rgba(0,0,0,0.6);
  }
  .heading h1 em {
    font-style: italic;
    background: linear-gradient(135deg, #e07ac8, #b36de8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #hero-word {
    display: inline-block;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  #hero-word.fade-out {
    opacity: 0;
    transform: translateY(-8px);
  }
  #hero-word.fade-in {
    opacity: 1;
    transform: translateY(0);
  }
  #hero-sub {
    transition: opacity 0.35s ease;
  }
  #hero-sub.fade-out { opacity: 0; }
  #hero-sub.fade-in  { opacity: 1; }

  .subtext {
    color: rgba(235, 215, 245, 0.42);
    font-size: 0.93rem;
    max-width: 400px;
    line-height: 1.75;
    animation: fadeUp 0.9s 0.22s ease both;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 13px;
    background: linear-gradient(135deg, #c155a0, #9548d0);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 17px 38px;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(220, 140, 230, 0.25);
    box-shadow: 0 0 28px rgba(180, 70, 190, 0.35), 0 0 70px rgba(180, 70, 190, 0.12);
    transition: transform 0.22s, box-shadow 0.22s;
    animation: fadeUp 0.9s 0.3s ease both;
  }
  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 55%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.13), transparent);
    transition: left 0.5s;
  }
  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 48px rgba(200, 80, 200, 0.55), 0 0 100px rgba(180, 70, 190, 0.2);
  }
  .btn:hover::before { left: 150%; }
  .btn svg { width: 26px; height: 26px; fill: #fff; flex-shrink: 0; }

  .small-link {
    color: rgba(220, 170, 235, 0.28);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-decoration: none;
    transition: color 0.2s;
    animation: fadeUp 0.9s 0.42s ease both;
  }
  .small-link:hover { color: #d18adc; }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(220, 190, 235, 0.28);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: fadeUp 0.9s 0.5s ease both;
    flex-direction: column;
    gap: 6px;
  }
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .online-count {
    color: #7ee87e;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #a855d4;
    box-shadow: 0 0 7px #a855d4;
    animation: blink 2.2s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  .fomo-toast {
    position: fixed;
    bottom: 28px;
    left: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(25, 14, 35, 0.92);
    border: 1px solid rgba(200, 120, 220, 0.22);
    border-radius: 10px;
    padding: 11px 16px;
    backdrop-filter: blur(12px);
    z-index: 100;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
    max-width: 260px;
  }
  .fomo-toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  .fomo-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c155a0, #7040c0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .fomo-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .fomo-name {
    color: #f0e0f8;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .fomo-action {
    color: rgba(210, 170, 235, 0.5);
    font-size: 0.7rem;
  }
</style>
</head>
<body>

<canvas id="hearts-canvas"></canvas>
<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>
<div class="glow-orb glow-orb-3"></div>
<div class="vignette"></div>
<div class="heart-deco heart-left">🩷</div>
<div class="heart-deco heart-right">🫀</div>

<div class="container">
  <div class="badge">
    <div class="badge-dot"></div>
    Zaproszenie
  </div>

  <div class="heading">
    <h1>Dołącz do <span id="hero-word"><em>naszej społeczności.</em></span></h1>
  </div>

  <p class="subtext" id="hero-sub">
    Kliknij poniżej, aby dołączyć do serwera Discord i być częścią czegoś większego.
  </p>

  <a class="btn" href="https://discord.gg/N5Vs4PT2dB" target="_blank">
    <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
      <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
    </svg>
    Dołącz teraz
  </a>

  <a class="small-link" href="https://discord.gg/N5Vs4PT2dB" target="_blank">discord.gg/N5Vs4PT2dB →</a>

  <div class="status">
    <div class="status-row">
      <div class="dot"></div>
      <span style="color:rgba(220,190,235,0.28);font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;">Serwer online</span>
    </div>
    <div class="status-row">
      <span style="font-size:14px;">🟢</span>
      <span class="online-count" id="online-count">94 online teraz</span>
    </div>
  </div>
</div>

<div class="fomo-toast" id="fomo-toast">
  <div class="fomo-avatar" id="fomo-avatar"></div>
  <div class="fomo-text">
    <div class="fomo-name" id="fomo-name"></div>
    <div class="fomo-action">właśnie dołączyła/ył 🩷</div>
  </div>
</div>

<script>
  const canvas = document.getElementById('hearts-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const HEARTS = ['♥', '♡', '❤', '💕'];
  const cols = Math.floor(canvas.width / 26);
  const drops = Array.from({length: cols}, () => Math.random() * -80);
  const chars = Array.from({length: cols}, () => HEARTS[Math.floor(Math.random() * HEARTS.length)]);
  const colors = ['#c060a8', '#9b50d0', '#e070b8', '#b070e0', '#d060c0'];

  function draw() {
    ctx.fillStyle = 'rgba(13, 8, 18, 0.055)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = '15px serif';
    for (let i = 0; i < drops.length; i++) {
      ctx.fillStyle = colors[i % colors.length];
      ctx.globalAlpha = 0.55 + Math.random() * 0.3;
      ctx.fillText(chars[i], i * 26, drops[i] * 26);

      if (Math.random() > 0.97) chars[i] = HEARTS[Math.floor(Math.random() * HEARTS.length)];
      if (drops[i] * 26 > canvas.height && Math.random() > 0.972) drops[i] = 0;
      drops[i] += 0.4 + Math.random() * 0.3;
    }
    ctx.globalAlpha = 1;
  }

  setInterval(draw, 42);

  // Online count — losuje między 91 a 99 przy wejściu
  const onlineEl = document.getElementById('online-count');
  let onlineNum = Math.floor(Math.random() * 9) + 91;
  onlineEl.textContent = onlineNum + ' online teraz';

  // co jakiś czas lekko fluktuuje
  setInterval(() => {
    onlineNum = Math.floor(Math.random() * 9) + 91;
    onlineEl.textContent = onlineNum + ' online teraz';
  }, 12000);

  // FOMO toasty
  const names = ['Zuzia','Natalia','Weronika','Ola','Kasia','Maja','Monika','Julia','Ania','Paulina','Marta','Zosia','Domi','Emka','Lena'];
  const emojis = ['🌸','💜','🩷','✨','🖤','💫','🌷','🫶'];
  const toast = document.getElementById('fomo-toast');
  const toastName = document.getElementById('fomo-name');
  const toastAvatar = document.getElementById('fomo-avatar');

  function showToast() {
    const name = names[Math.floor(Math.random() * names.length)];
    const em = emojis[Math.floor(Math.random() * emojis.length)];
    toastName.textContent = name;
    toastAvatar.textContent = em;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3200);
  }

  // pierwsze po 4s, potem co 9-18s
  setTimeout(() => {
    showToast();
    setInterval(showToast, 9000 + Math.random() * 9000);
  }, 4000);

  // === DYNAMICZNY NAGŁÓWEK ===
  const heroLines = [
    { word: '<em>naszej społeczności.</em>',   sub: 'Kliknij poniżej, aby dołączyć do serwera Discord i być częścią czegoś większego.' },
    { word: '<em>grona wybranych. 🖤</em>',    sub: 'Nie każdy tu trafia. Ale Ty masz zaproszenie — nie zmarnuj go.' },
    { word: '<em>miejsca dla Ciebie. 🩷</em>', sub: 'Czekamy właśnie na kogoś takiego jak Ty. Serio.' },
    { word: '<em>czegoś wyjątkowego. ✨</em>',  sub: 'Tu dzieją się rzeczy. Dołącz i przekonaj się sama.' },
  ];
  let heroIdx = 0;
  const heroWord = document.getElementById('hero-word');
  const heroSub  = document.getElementById('hero-sub');

  function rotateHero() {
    heroWord.classList.add('fade-out');
    heroSub.classList.add('fade-out');
    setTimeout(() => {
      heroIdx = (heroIdx + 1) % heroLines.length;
      heroWord.innerHTML = heroLines[heroIdx].word;
      heroSub.textContent = heroLines[heroIdx].sub;
      heroWord.classList.remove('fade-out');
      heroSub.classList.remove('fade-out');
    }, 370);
  }
  setInterval(rotateHero, 10000);

  // === DYNAMICZNY TYTUŁ ZAKŁADKI ===
  const titleAway = [
    '💔 Wróć! Czekamy...',
    '🩷 Tęsknimy za Tobą...',
    '😢 Nie odchodź...',
    '💜 Hej, zostań z nami!',
  ];
  const titleHere = [
    '🩷 Witamy z powrotem!',
    '✨ Cieszmy się, że jesteś!',
    '💜 Jesteś tu z nami!',
  ];
  let awayIdx = 0, hereIdx = 0, awayTimer = null;

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      awayIdx = 0;
      document.title = titleAway[awayIdx];
      awayTimer = setInterval(() => {
        awayIdx = (awayIdx + 1) % titleAway.length;
        document.title = titleAway[awayIdx];
      }, 3500);
    } else {
      clearInterval(awayTimer);
      document.title = titleHere[hereIdx % titleHere.length];
      hereIdx++;
      setTimeout(() => { document.title = 'Join Discord'; }, 3000);
    }
  });

  // === DEVTOOLS PROTECTION ===
  const KILLED = () => {
    document.body.innerHTML = '';
    document.head.innerHTML = '';
    window.stop && window.stop();
  };

  // 1. Blokada klawiszy F12, Ctrl+Shift+I/J/C/U, Ctrl+U
  document.addEventListener('keydown', (e) => {
    if (
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) ||
      (e.ctrlKey && e.key.toUpperCase() === 'U')
    ) {
      e.preventDefault();
      e.stopPropagation();
      KILLED();
    }
  }, true);

  // 2. Blokada prawego przycisku myszy
  document.addEventListener('contextmenu', (e) => { e.preventDefault(); });

  // 3. Wykrywanie devtools — tylko desktop, telefon pomijamy (pasek adresu fałszywie odpala)
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  if (!isMobile) {
    const THRESHOLD = 160;
    function checkDevtools() {
      const widthDiff = window.outerWidth - window.innerWidth;
      if (widthDiff > THRESHOLD) KILLED();
    }
    setInterval(checkDevtools, 1200);

    // 4. Debugger pułapka
    (function devtrapLoop() {
      const start = performance.now();
      debugger;
      if (performance.now() - start > 100) KILLED();
      setTimeout(devtrapLoop, 2000);
    })();
  }
</script>
</body>
</html>
